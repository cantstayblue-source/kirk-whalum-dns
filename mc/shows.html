<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/mc/">
    <title>Shows & Band | Kirk Whalum Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mc-styles.css">
</head>
<body>

<button class="mc-mobile-toggle" aria-label="Toggle menu">&#9776;</button>
<div class="mc-layout">
    <aside class="mc-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">&#127927;</div>
            <div class="sidebar-brand">
                <h1>Kirk Whalum</h1>
                <span>Mission Control</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link"><span class="icon">&#128202;</span><span class="label">Dashboard</span></a>
            <a href="content.html" class="sidebar-link"><span class="icon">&#128249;</span><span class="label">Content</span></a>
            <a href="shows.html" class="sidebar-link active"><span class="icon">&#127908;</span><span class="label">Shows</span></a>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section-label">Business</div>
            <a href="funnels.html" class="sidebar-link"><span class="icon">&#127919;</span><span class="label">Funnels</span></a>
            <a href="crm.html" class="sidebar-link"><span class="icon">&#128101;</span><span class="label">CRM</span></a>
            <a href="tasks.html" class="sidebar-link"><span class="icon">&#9889;</span><span class="label">Tasks</span></a>
            <div class="sidebar-divider"></div>
            <div class="sidebar-section-label">System</div>
            <a href="settings.html" class="sidebar-link"><span class="icon">&#9881;</span><span class="label">Settings</span></a>
            <a href="api-docs.html" class="sidebar-link"><span class="icon">&#128218;</span><span class="label">API Docs</span></a>
            <div class="sidebar-divider"></div>
            <a href="../website.html" class="sidebar-link"><span class="icon">&#127760;</span><span class="label">Public Site</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="ai-badge"><span class="dot"></span> <span>Valarnette Active</span></div>
            <button class="theme-toggle" id="theme-toggle-btn" onclick="mcToggleTheme()">
                <span class="toggle-icon">&#9728;&#65039;</span> Light Mode
            </button>
        </div>
    </aside>
    <div class="mc-sidebar-overlay"></div>

    <main class="mc-main">
        <!-- Header -->
        <div class="mc-header">
            <div>
                <h2>Shows & Band Management</h2>
                <p>Manage shows, band roster, and post-show follow-ups</p>
            </div>
            <div class="mc-header-actions">
                <span class="badge badge-confirmed" style="font-size:0.6rem; gap:6px;"><span class="dot" style="width:5px;height:5px;background:var(--success);border-radius:50%;display:inline-block;"></span> Connected to Airtable</span>
                <button class="btn btn-primary" onclick="mcOpenModal('add-show')">+ Add Show</button>
            </div>
        </div>

        <div class="mc-body">
            <!-- Metrics Row -->
            <div class="metrics-row" id="shows-metrics"></div>

            <!-- Filter Tabs -->
            <div class="mc-tabs" id="shows-filter-tabs">
                <button class="mc-tab active" data-filter="all">All Shows</button>
                <button class="mc-tab" data-filter="confirmed">Confirmed</button>
                <button class="mc-tab" data-filter="planning">Planning</button>
                <button class="mc-tab" data-filter="tentative">Tentative</button>
                <button class="mc-tab" data-filter="completed">Completed</button>
            </div>

            <!-- Shows List -->
            <div id="shows-list"></div>
        </div>
    </main>
</div>

<!-- Add Show Modal -->
<div class="mc-modal-overlay" id="modal-add-show">
    <div class="mc-modal">
        <div class="mc-modal-header">
            <h3>Add New Show</h3>
            <button class="mc-modal-close" onclick="mcCloseModal('add-show')">&times;</button>
        </div>
        <div class="mc-modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" class="form-control" id="new-show-date">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select class="form-control" id="new-show-status">
                        <option value="confirmed">Confirmed</option>
                        <option value="planning">Planning</option>
                        <option value="tentative" selected>Tentative</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Venue</label>
                <input type="text" class="form-control" id="new-show-venue" placeholder="e.g. Blue Note">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" class="form-control" id="new-show-city" placeholder="e.g. New York">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" class="form-control" id="new-show-state" placeholder="e.g. NY">
                </div>
            </div>
            <div class="form-group">
                <label>Ticket Link</label>
                <input type="text" class="form-control" id="new-show-ticket" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea class="form-control" id="new-show-notes" placeholder="Any special notes about this show..."></textarea>
            </div>
        </div>
        <div class="mc-modal-footer">
            <button class="btn btn-outline" onclick="mcCloseModal('add-show')">Cancel</button>
            <button class="btn btn-primary" onclick="addShow()">Add Show</button>
        </div>
    </div>
</div>

<!-- Edit Show Modal -->
<div class="mc-modal-overlay" id="modal-edit-show">
    <div class="mc-modal">
        <div class="mc-modal-header">
            <h3>Edit Show</h3>
            <button class="mc-modal-close" onclick="mcCloseModal('edit-show')">&times;</button>
        </div>
        <div class="mc-modal-body">
            <input type="hidden" id="edit-show-id">
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" class="form-control" id="edit-show-date">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select class="form-control" id="edit-show-status">
                        <option value="confirmed">Confirmed</option>
                        <option value="planning">Planning</option>
                        <option value="tentative">Tentative</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Venue</label>
                <input type="text" class="form-control" id="edit-show-venue">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" class="form-control" id="edit-show-city">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" class="form-control" id="edit-show-state">
                </div>
            </div>
            <div class="form-group">
                <label>Ticket Link</label>
                <input type="text" class="form-control" id="edit-show-ticket">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea class="form-control" id="edit-show-notes"></textarea>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:10px;">
                <input type="checkbox" id="edit-show-completed" style="accent-color:var(--accent);width:18px;height:18px;">
                <label for="edit-show-completed" style="margin-bottom:0;">Mark as Completed</label>
            </div>
        </div>
        <div class="mc-modal-footer">
            <button class="btn btn-danger btn-sm" onclick="deleteShow()">Delete</button>
            <div style="flex:1"></div>
            <button class="btn btn-outline" onclick="mcCloseModal('edit-show')">Cancel</button>
            <button class="btn btn-primary" onclick="saveShow()">Save Changes</button>
        </div>
    </div>
</div>

<script src="mc-data.js"></script>
<script src="mc-api.js"></script>
<script src="mc-app.js"></script>
<script>
(function() {
    'use strict';

    const CORE_BAND = [
        { name: 'Kirk Whalum', instrument: 'Saxophone' },
        { name: 'John Stoddart', instrument: 'Keys' },
        { name: 'Andrea Lisa', instrument: 'Guitar' },
        { name: 'Braylon Lacy', instrument: 'Bass' },
        { name: 'Marcus Finnie', instrument: 'Drums' }
    ];

    let currentFilter = 'all';

    // ── Render Metrics ──
    function renderMetrics() {
        const shows = mcStore.getAll('shows');
        const confirmed = shows.filter(s => s.status === 'confirmed').length;
        const planning = shows.filter(s => s.status === 'planning').length;
        const tentative = shows.filter(s => s.status === 'tentative').length;
        const completed = shows.filter(s => s.completed).length;

        document.getElementById('shows-metrics').innerHTML = `
            <div class="metric-card">
                <div class="value">${shows.length}</div>
                <div class="label">Total Shows</div>
            </div>
            <div class="metric-card">
                <div class="value" style="color:var(--success)">${confirmed}</div>
                <div class="label">Confirmed</div>
            </div>
            <div class="metric-card">
                <div class="value" style="color:var(--warning)">${planning}</div>
                <div class="label">Planning</div>
            </div>
            <div class="metric-card">
                <div class="value" style="color:var(--text-dim)">${tentative}</div>
                <div class="label">Tentative</div>
            </div>
            <div class="metric-card">
                <div class="value" style="color:var(--accent)">${completed}</div>
                <div class="label">Completed</div>
            </div>
        `;
    }

    // ── Render Shows List ──
    function renderShows() {
        let shows = mcStore.getAll('shows');

        // Sort: upcoming dated shows first (by date), then TBD shows
        shows.sort((a, b) => {
            if (a.date && b.date) return new Date(a.date) - new Date(b.date);
            if (a.date && !b.date) return -1;
            if (!a.date && b.date) return 1;
            return 0;
        });

        // Apply filter
        if (currentFilter !== 'all') {
            if (currentFilter === 'completed') {
                shows = shows.filter(s => s.completed);
            } else {
                shows = shows.filter(s => s.status === currentFilter && !s.completed);
            }
        }

        const container = document.getElementById('shows-list');

        if (shows.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">&#127908;</div>
                    <h3>No shows found</h3>
                    <p>Add a show or change the filter to see results.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = shows.map(show => {
            const dateInfo = mcFormatShortDate(show.date);
            const isCompleted = show.completed;
            const statusClass = isCompleted ? 'completed' : show.status;

            // Band roster
            const bandMembers = CORE_BAND.map(member => {
                const bandData = (show.band && show.band[member.name]) || { confirmed: false };
                return { ...member, confirmed: bandData.confirmed };
            });

            const confirmedCount = bandMembers.filter(m => m.confirmed).length;

            // Ezra Effect for completed shows
            const ezra = show.ezraEffect || { day1: false, day2: false, day3: false };
            const ezraComplete = ezra.day1 && ezra.day2 && ezra.day3;

            return `
            <div class="mc-card mb-2" data-show-id="${show.id}">
                <div class="mc-card-header" style="cursor:pointer;" onclick="toggleShowDetails('${show.id}')">
                    <div style="display:flex;align-items:center;gap:14px;flex:1;min-width:0;">
                        <div class="show-date-badge">
                            <div class="day">${dateInfo.day}</div>
                            <div class="month">${dateInfo.month}</div>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <h3 style="font-size:0.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${show.venue}</h3>
                            <p style="font-size:0.75rem;color:var(--text-dim);">${show.city}, ${show.state}${show.notes ? ' &mdash; ' + escapeHtml(show.notes) : ''}</p>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
                        <span class="badge badge-${statusClass}">${isCompleted ? 'Completed' : show.status}</span>
                        <span class="text-xs text-dim">${confirmedCount}/${bandMembers.length} band</span>
                        ${isCompleted && !ezraComplete ? '<span class="badge badge-draft">Follow-up needed</span>' : ''}
                        ${isCompleted && ezraComplete ? '<span class="badge badge-ready">Follow-up done</span>' : ''}
                        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); openEditShow('${show.id}')">Edit</button>
                        <span class="text-dim" style="font-size:1rem;transition:transform 0.2s;" id="chevron-${show.id}">&#9660;</span>
                    </div>
                </div>

                <div class="mc-card-body" id="details-${show.id}" style="display:none;">
                    <div class="grid-2" style="gap:24px;">
                        <!-- Band Roster -->
                        <div>
                            <h4 style="font-size:0.8rem;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">Band Roster</h4>
                            ${bandMembers.map(member => `
                                <div class="checkbox-item ${member.confirmed ? 'checked' : ''}" onclick="toggleBandMember('${show.id}', '${member.name}')">
                                    <div class="checkbox-box">${member.confirmed ? '&#10003;' : ''}</div>
                                    <span class="checkbox-label">${member.name}</span>
                                    <span class="text-xs text-muted" style="margin-left:auto;">${member.instrument}</span>
                                </div>
                            `).join('')}

                            <div class="form-group mt-2">
                                <label>Subs / Special Guests</label>
                                <input type="text" class="form-control" placeholder="e.g. Guest vocalist..."
                                    value="${escapeHtml((show.bandNotes || ''))}"
                                    onchange="updateShowField('${show.id}', 'bandNotes', this.value)">
                            </div>

                            <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
                                <div class="checkbox-item ${show.chartsDistributed ? 'checked' : ''}" onclick="toggleCharts('${show.id}')">
                                    <div class="checkbox-box">${show.chartsDistributed ? '&#10003;' : ''}</div>
                                    <span class="checkbox-label">Charts Distributed</span>
                                </div>
                                <div class="form-group mt-1">
                                    <label>Dropbox Link</label>
                                    <input type="text" class="form-control" placeholder="https://dropbox.com/..."
                                        value="${escapeHtml(show.chartDropboxLink || '')}"
                                        onchange="updateShowField('${show.id}', 'chartDropboxLink', this.value)">
                                </div>
                            </div>
                        </div>

                        <!-- Ezra Effect -->
                        <div>
                            <h4 style="font-size:0.8rem;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">Ezra Effect (3-Day Follow-Up)</h4>
                            ${isCompleted ? `
                                <div style="background:var(--bg-dark);border-radius:var(--radius-sm);padding:16px;">
                                    <div class="checkbox-item ${ezra.day1 ? 'checked' : ''}" onclick="toggleEzra('${show.id}', 'day1')">
                                        <div class="checkbox-box">${ezra.day1 ? '&#10003;' : ''}</div>
                                        <div>
                                            <span class="checkbox-label">Day 1: Thank You Email</span>
                                            <p class="text-xs text-dim" style="margin-top:2px;">Personal thank you to attendees and venue</p>
                                        </div>
                                    </div>
                                    <div class="checkbox-item ${ezra.day2 ? 'checked' : ''}" onclick="toggleEzra('${show.id}', 'day2')">
                                        <div class="checkbox-box">${ezra.day2 ? '&#10003;' : ''}</div>
                                        <div>
                                            <span class="checkbox-label">Day 2: Content Share</span>
                                            <p class="text-xs text-dim" style="margin-top:2px;">Share photos, video clips, and highlights</p>
                                        </div>
                                    </div>
                                    <div class="checkbox-item ${ezra.day3 ? 'checked' : ''}" onclick="toggleEzra('${show.id}', 'day3')">
                                        <div class="checkbox-box">${ezra.day3 ? '&#10003;' : ''}</div>
                                        <div>
                                            <span class="checkbox-label">Day 3: Next Show Invite</span>
                                            <p class="text-xs text-dim" style="margin-top:2px;">Invite to upcoming shows and events</p>
                                        </div>
                                    </div>
                                </div>
                                ${ezraComplete ? '<p class="text-xs text-success mt-1" style="text-align:center;">All follow-ups complete</p>' : '<p class="text-xs text-warning mt-1" style="text-align:center;">Follow-up in progress...</p>'}
                            ` : `
                                <div class="empty-state" style="padding:30px 16px;">
                                    <div class="icon" style="font-size:1.5rem;">&#128274;</div>
                                    <p class="text-xs text-dim">Ezra Effect follow-up unlocks when this show is marked as completed.</p>
                                </div>
                            `}

                            <!-- Show Info -->
                            <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
                                <h4 style="font-size:0.8rem;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">Show Details</h4>
                                <div style="display:flex;flex-direction:column;gap:8px;">
                                    <div class="flex-between">
                                        <span class="text-xs text-dim">Venue</span>
                                        <span class="text-sm">${escapeHtml(show.venue)}</span>
                                    </div>
                                    <div class="flex-between">
                                        <span class="text-xs text-dim">Location</span>
                                        <span class="text-sm">${escapeHtml(show.city)}, ${escapeHtml(show.state)}</span>
                                    </div>
                                    <div class="flex-between">
                                        <span class="text-xs text-dim">Date</span>
                                        <span class="text-sm">${show.date ? mcFormatDate(show.date) : 'TBD'}</span>
                                    </div>
                                    ${show.ticketLink && show.ticketLink !== '#' ? `
                                    <div class="flex-between">
                                        <span class="text-xs text-dim">Tickets</span>
                                        <a href="${escapeHtml(show.ticketLink)}" target="_blank" class="text-sm text-accent" style="text-decoration:none;">View Link &rarr;</a>
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    // ── Toggle Show Details ──
    window.toggleShowDetails = function(showId) {
        const details = document.getElementById('details-' + showId);
        const chevron = document.getElementById('chevron-' + showId);
        if (details.style.display === 'none') {
            details.style.display = 'block';
            chevron.style.transform = 'rotate(180deg)';
        } else {
            details.style.display = 'none';
            chevron.style.transform = 'rotate(0deg)';
        }
    };

    // ── Toggle Band Member ──
    window.toggleBandMember = function(showId, memberName) {
        const show = mcStore.getById('shows', showId);
        if (!show) return;
        const band = show.band || {};
        if (!band[memberName]) {
            band[memberName] = { instrument: CORE_BAND.find(m => m.name === memberName)?.instrument || '', confirmed: true };
        } else {
            band[memberName].confirmed = !band[memberName].confirmed;
        }
        mcStore.update('shows', showId, { band });
        renderShows();
    };

    // ── Toggle Charts Distributed ──
    window.toggleCharts = function(showId) {
        const show = mcStore.getById('shows', showId);
        if (!show) return;
        mcStore.update('shows', showId, { chartsDistributed: !show.chartsDistributed });
        renderShows();
    };

    // ── Toggle Ezra Effect Step ──
    window.toggleEzra = function(showId, day) {
        const show = mcStore.getById('shows', showId);
        if (!show) return;
        const ezra = show.ezraEffect || { day1: false, day2: false, day3: false };
        ezra[day] = !ezra[day];
        mcStore.update('shows', showId, { ezraEffect: ezra });
        mcStore.logActivity('ezra-effect', `Updated ${day} for ${show.venue}`);
        renderShows();
        renderMetrics();
    };

    // ── Update Show Field ──
    window.updateShowField = function(showId, field, value) {
        mcStore.update('shows', showId, { [field]: value });
    };

    // ── Add Show ──
    window.addShow = function() {
        const venue = document.getElementById('new-show-venue').value.trim();
        const city = document.getElementById('new-show-city').value.trim();
        const state = document.getElementById('new-show-state').value.trim();
        const date = document.getElementById('new-show-date').value || null;
        const status = document.getElementById('new-show-status').value;
        const ticketLink = document.getElementById('new-show-ticket').value.trim() || '#';
        const notes = document.getElementById('new-show-notes').value.trim();

        if (!venue) {
            mcToast('Please enter a venue name.', 'error');
            return;
        }

        const band = {};
        CORE_BAND.forEach(m => {
            band[m.name] = { instrument: m.instrument, confirmed: false };
        });

        mcStore.create('shows', {
            date, venue, city, state, ticketLink, status, notes,
            band,
            chartsDistributed: false,
            chartDropboxLink: '',
            ezraEffect: { day1: false, day2: false, day3: false },
            completed: false
        });

        mcStore.logActivity('show-added', `Added show: ${venue}, ${city}`);
        mcToast(`Show added: ${venue}`, 'success');
        mcCloseModal('add-show');

        // Reset form
        document.getElementById('new-show-venue').value = '';
        document.getElementById('new-show-city').value = '';
        document.getElementById('new-show-state').value = '';
        document.getElementById('new-show-date').value = '';
        document.getElementById('new-show-status').value = 'tentative';
        document.getElementById('new-show-ticket').value = '';
        document.getElementById('new-show-notes').value = '';

        renderMetrics();
        renderShows();
    };

    // ── Open Edit Show ──
    window.openEditShow = function(showId) {
        const show = mcStore.getById('shows', showId);
        if (!show) return;

        document.getElementById('edit-show-id').value = show.id;
        document.getElementById('edit-show-date').value = show.date || '';
        document.getElementById('edit-show-venue').value = show.venue || '';
        document.getElementById('edit-show-city').value = show.city || '';
        document.getElementById('edit-show-state').value = show.state || '';
        document.getElementById('edit-show-status').value = show.completed ? 'completed' : show.status;
        document.getElementById('edit-show-ticket').value = show.ticketLink || '';
        document.getElementById('edit-show-notes').value = show.notes || '';
        document.getElementById('edit-show-completed').checked = show.completed || false;

        mcOpenModal('edit-show');
    };

    // ── Save Show ──
    window.saveShow = function() {
        const id = document.getElementById('edit-show-id').value;
        const date = document.getElementById('edit-show-date').value || null;
        const venue = document.getElementById('edit-show-venue').value.trim();
        const city = document.getElementById('edit-show-city').value.trim();
        const state = document.getElementById('edit-show-state').value.trim();
        const status = document.getElementById('edit-show-status').value;
        const ticketLink = document.getElementById('edit-show-ticket').value.trim();
        const notes = document.getElementById('edit-show-notes').value.trim();
        const completed = document.getElementById('edit-show-completed').checked;

        if (!venue) {
            mcToast('Venue is required.', 'error');
            return;
        }

        mcStore.update('shows', id, {
            date, venue, city, state, ticketLink, notes,
            status: completed ? 'completed' : status,
            completed
        });

        mcStore.logActivity('show-updated', `Updated show: ${venue}`);
        mcToast(`Show updated: ${venue}`, 'success');
        mcCloseModal('edit-show');
        renderMetrics();
        renderShows();
    };

    // ── Delete Show ──
    window.deleteShow = function() {
        const id = document.getElementById('edit-show-id').value;
        const show = mcStore.getById('shows', id);
        if (!show) return;
        if (!confirm(`Delete show at ${show.venue}? This cannot be undone.`)) return;

        mcStore.delete('shows', id);
        mcStore.logActivity('show-deleted', `Deleted show: ${show.venue}`);
        mcToast(`Show deleted: ${show.venue}`, 'success');
        mcCloseModal('edit-show');
        renderMetrics();
        renderShows();
    };

    // ── Filter Tabs ──
    document.querySelectorAll('#shows-filter-tabs .mc-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('#shows-filter-tabs .mc-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderShows();
        });
    });

    // ── Escape HTML ──
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    window.escapeHtml = escapeHtml;

    // ── Init ──
    renderMetrics();
    renderShows();

})();
</script>

</body>
</html>
