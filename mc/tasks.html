<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/mc/">
    <title>Tasks - Kirk Whalum Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mc-styles.css">
</head>
<body>
    <button class="mc-mobile-toggle" aria-label="Toggle menu">&#9776;</button>
    <div class="mc-layout">
        <aside class="mc-sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">&#127927;</div>
                <div class="sidebar-brand">
                    <h1>Kirk Whalum</h1>
                    <span>Mission Control</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link"><span class="icon">&#128202;</span><span class="label">Dashboard</span></a>
                <a href="content.html" class="sidebar-link"><span class="icon">&#128249;</span><span class="label">Content</span></a>
                <a href="shows.html" class="sidebar-link"><span class="icon">&#127908;</span><span class="label">Shows</span></a>
                <div class="sidebar-divider"></div>
                <div class="sidebar-section-label">Business</div>
                <a href="funnels.html" class="sidebar-link"><span class="icon">&#127919;</span><span class="label">Funnels</span></a>
                <a href="crm.html" class="sidebar-link"><span class="icon">&#128101;</span><span class="label">CRM</span></a>
                <a href="tasks.html" class="sidebar-link active"><span class="icon">&#9889;</span><span class="label">Tasks</span></a>
                <div class="sidebar-divider"></div>
                <div class="sidebar-section-label">System</div>
                <a href="settings.html" class="sidebar-link"><span class="icon">&#9881;</span><span class="label">Settings</span></a>
                <a href="api-docs.html" class="sidebar-link"><span class="icon">&#128218;</span><span class="label">API Docs</span></a>
                <div class="sidebar-divider"></div>
                <a href="../website.html" class="sidebar-link"><span class="icon">&#127760;</span><span class="label">Public Site</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="ai-badge"><span class="dot"></span> <span>Valarnette Active</span></div>
                <button class="theme-toggle" id="theme-toggle-btn" onclick="mcToggleTheme()">
                    <span class="toggle-icon">&#9728;&#65039;</span> Light Mode
                </button>
            </div>
        </aside>
        <div class="mc-sidebar-overlay"></div>
        <main class="mc-main">
            <!-- Header -->
            <div class="mc-header">
                <div>
                    <h2>Task Management</h2>
                    <p>Kirk and Valarnette task boards</p>
                </div>
                <div class="mc-header-actions" id="task-summary-badges"></div>
            </div>

            <div class="mc-body">
                <!-- Quick Add Form -->
                <div class="mc-card mb-2">
                    <div class="mc-card-body">
                        <div class="form-inline">
                            <div class="form-group" style="flex:3;">
                                <label>Task Title</label>
                                <input type="text" class="form-control" id="quick-title" placeholder="What needs to be done?">
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>Assignee</label>
                                <select class="form-control" id="quick-assignee">
                                    <option value="kirk">Kirk</option>
                                    <option value="valarnette">Valarnette</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>Priority</label>
                                <select class="form-control" id="quick-priority">
                                    <option value="medium">Medium</option>
                                    <option value="high">High</option>
                                    <option value="low">Low</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:0 0 auto;">
                                <label>&nbsp;</label>
                                <button class="btn btn-primary" onclick="quickAddTask()">+ Add</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- View Tabs -->
                <div class="mc-tabs" id="task-view-tabs">
                    <button class="mc-tab active" data-tab="view-all">All Tasks</button>
                    <button class="mc-tab" data-tab="view-kirk">Kirk's Tasks</button>
                    <button class="mc-tab" data-tab="view-valarnette">Valarnette Tasks</button>
                </div>

                <!-- Kanban Boards -->
                <div class="mc-tab-content active" id="view-all">
                    <div class="kanban" id="kanban-all"></div>
                </div>
                <div class="mc-tab-content" id="view-kirk">
                    <div class="kanban" id="kanban-kirk"></div>
                </div>
                <div class="mc-tab-content" id="view-valarnette">
                    <div class="kanban" id="kanban-valarnette"></div>
                </div>
            </div>

            <!-- Task Detail Modal -->
            <div class="mc-modal-overlay" id="modal-task">
                <div class="mc-modal">
                    <div class="mc-modal-header">
                        <h3 id="task-modal-title">Task Details</h3>
                        <button class="mc-modal-close" onclick="mcCloseModal('task')">&times;</button>
                    </div>
                    <div class="mc-modal-body">
                        <input type="hidden" id="task-edit-id">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" class="form-control" id="task-title">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="task-desc"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Assignee</label>
                                <select class="form-control" id="task-assignee">
                                    <option value="kirk">Kirk</option>
                                    <option value="valarnette">Valarnette</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Priority</label>
                                <select class="form-control" id="task-priority">
                                    <option value="high">High</option>
                                    <option value="medium">Medium</option>
                                    <option value="low">Low</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Status</label>
                                <select class="form-control" id="task-status">
                                    <option value="todo">To Do</option>
                                    <option value="in-progress">In Progress</option>
                                    <option value="review">Review</option>
                                    <option value="done">Done</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Due Date</label>
                                <input type="date" class="form-control" id="task-due">
                            </div>
                        </div>
                    </div>
                    <div class="mc-modal-footer">
                        <button class="btn btn-danger btn-sm" id="task-delete-btn" onclick="deleteTask()" style="margin-right:auto;">Delete</button>
                        <button class="btn btn-outline" onclick="mcCloseModal('task')">Cancel</button>
                        <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="mc-data.js"></script>
    <script src="mc-api.js"></script>
    <script src="mc-app.js"></script>
    <script>
    (function() {
        'use strict';

        const COLUMNS = [
            { key: 'todo', label: 'To Do', icon: '&#128203;' },
            { key: 'in-progress', label: 'In Progress', icon: '&#9889;' },
            { key: 'review', label: 'Review', icon: '&#128269;' },
            { key: 'done', label: 'Done', icon: '&#9989;' }
        ];

        // ---- Render Summary Badges ----
        function renderSummary() {
            const tasks = mcStore.getAll('tasks');
            const open = tasks.filter(t => t.status !== 'done').length;
            const kirkCount = tasks.filter(t => t.assignee === 'kirk' && t.status !== 'done').length;
            const ocCount = tasks.filter(t => t.assignee === 'valarnette' && t.status !== 'done').length;

            document.getElementById('task-summary-badges').innerHTML = `
                <span class="badge badge-high">${open} open</span>
                <span class="badge badge-kirk">Kirk: ${kirkCount}</span>
                <span class="badge badge-valarnette">Val: ${ocCount}</span>
            `;
        }

        // ---- Build Kanban Board ----
        function buildKanban(containerId, tasks) {
            const container = document.getElementById(containerId);

            container.innerHTML = COLUMNS.map(col => {
                const colTasks = tasks.filter(t => t.status === col.key);
                const cards = colTasks.map(t => renderTaskCard(t)).join('');

                return `
                    <div class="kanban-column">
                        <div class="kanban-column-header">
                            <span>${col.icon} ${col.label}</span>
                            <span class="count">${colTasks.length}</span>
                        </div>
                        <div class="kanban-column-body">
                            ${cards || '<div class="text-xs text-muted text-center" style="padding:20px;">No tasks</div>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ---- Render a Single Task Card ----
        function renderTaskCard(task) {
            const dueDateStr = task.dueDate ? mcFormatDate(task.dueDate) : '';
            const isOverdue = task.dueDate && new Date(task.dueDate) < new Date() && task.status !== 'done';

            return `
                <div class="kanban-card" onclick="openTaskModal('${task.id}')">
                    <h4>${task.title}</h4>
                    <p>${task.description || ''}</p>
                    <div class="badges">
                        <span class="badge badge-${task.priority}">${task.priority}</span>
                        <span class="badge badge-${task.assignee}">${task.assignee === 'kirk' ? 'Kirk' : 'Valarnette'}</span>
                        ${dueDateStr ? `<span class="text-xs ${isOverdue ? 'text-danger' : 'text-dim'}">${dueDateStr}${isOverdue ? ' (overdue)' : ''}</span>` : ''}
                    </div>
                    <div style="margin-top:8px;">
                        <select class="form-control" style="padding:4px 8px; font-size:0.65rem; width:auto;" onchange="quickStatusChange('${task.id}', this.value); event.stopPropagation();" onclick="event.stopPropagation();">
                            ${COLUMNS.map(col => `<option value="${col.key}" ${task.status === col.key ? 'selected' : ''}>${col.label}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `;
        }

        // ---- Quick Status Change ----
        window.quickStatusChange = function(taskId, newStatus) {
            mcStore.update('tasks', taskId, { status: newStatus });
            mcToast('Task moved to ' + COLUMNS.find(c => c.key === newStatus).label, 'success');
            renderAll();
        };

        // ---- Quick Add Task ----
        window.quickAddTask = function() {
            const title = document.getElementById('quick-title').value.trim();
            const assignee = document.getElementById('quick-assignee').value;
            const priority = document.getElementById('quick-priority').value;

            if (!title) {
                mcToast('Task title is required', 'error');
                return;
            }

            mcStore.create('tasks', {
                title: title,
                description: '',
                priority: priority,
                status: 'todo',
                assignee: assignee,
                dueDate: null
            });

            document.getElementById('quick-title').value = '';
            mcToast('Task added', 'success');
            renderAll();
        };

        // Allow Enter key to add task
        document.getElementById('quick-title').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                quickAddTask();
            }
        });

        // ---- Open Task Modal ----
        window.openTaskModal = function(taskId) {
            const task = mcStore.getById('tasks', taskId);
            if (!task) return;

            document.getElementById('task-modal-title').textContent = 'Edit Task';
            document.getElementById('task-edit-id').value = taskId;
            document.getElementById('task-title').value = task.title || '';
            document.getElementById('task-desc').value = task.description || '';
            document.getElementById('task-assignee').value = task.assignee || 'kirk';
            document.getElementById('task-priority').value = task.priority || 'medium';
            document.getElementById('task-status').value = task.status || 'todo';
            document.getElementById('task-due').value = task.dueDate || '';
            document.getElementById('task-delete-btn').style.display = 'inline-flex';

            mcOpenModal('task');
        };

        // ---- Save Task ----
        window.saveTask = function() {
            const editId = document.getElementById('task-edit-id').value;
            const data = {
                title: document.getElementById('task-title').value.trim(),
                description: document.getElementById('task-desc').value.trim(),
                assignee: document.getElementById('task-assignee').value,
                priority: document.getElementById('task-priority').value,
                status: document.getElementById('task-status').value,
                dueDate: document.getElementById('task-due').value || null
            };

            if (!data.title) {
                mcToast('Task title is required', 'error');
                return;
            }

            if (editId) {
                mcStore.update('tasks', editId, data);
                mcToast('Task updated', 'success');
            } else {
                mcStore.create('tasks', data);
                mcToast('Task created', 'success');
            }

            mcCloseModal('task');
            renderAll();
        };

        // ---- Delete Task ----
        window.deleteTask = function() {
            const editId = document.getElementById('task-edit-id').value;
            if (!editId) return;
            if (!confirm('Delete this task?')) return;

            mcStore.delete('tasks', editId);
            mcCloseModal('task');
            mcToast('Task deleted', 'success');
            renderAll();
        };

        // ---- Render All Kanban Boards ----
        function renderBoards() {
            const allTasks = mcStore.getAll('tasks');
            const kirkTasks = allTasks.filter(t => t.assignee === 'kirk');
            const ocTasks = allTasks.filter(t => t.assignee === 'valarnette');

            buildKanban('kanban-all', allTasks);
            buildKanban('kanban-kirk', kirkTasks);
            buildKanban('kanban-valarnette', ocTasks);
        }

        // ---- Tab switching ----
        function initTabs() {
            const tabsEl = document.getElementById('task-view-tabs');
            const tabs = tabsEl.querySelectorAll('.mc-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.tab;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.mc-tab-content').forEach(c => c.classList.remove('active'));
                    const targetEl = document.getElementById(target);
                    if (targetEl) targetEl.classList.add('active');
                });
            });
        }

        // ---- Render All ----
        function renderAll() {
            renderSummary();
            renderBoards();
        }

        // ---- Init ----
        initTabs();
        renderAll();

        // Listen for data changes from other tabs
        window.addEventListener('mc:data-changed', renderAll);
    })();
    </script>
</body>
</html>
